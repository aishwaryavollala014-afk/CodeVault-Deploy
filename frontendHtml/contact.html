<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Contact CodeVault." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23f1543f'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='15' fill='white' text-anchor='middle' font-weight='bold'%3ECV%3C/text%3E%3C/svg%3E" />
<title>Contact · CodeVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#f8f6f1;--card:#fff;--ink:#1a160f;--ink-2:#3a352c;--muted:#6f6a5f;--faint:#7a7568;--border:#ece7dc;--border-2:#e2dccd;--brand:#f1543f;--brand-d:#d8431f;--brand-soft:#fdeae4;--rose:#e0457b;--mono:'JetBrains Mono',ui-monospace,monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none} :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px}
  .nav{position:sticky;top:0;background:rgba(248,246,241,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .nav-in{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 24px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
  .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--rose));color:#fff;display:grid;place-items:center;font-family:var(--mono);font-weight:800;font-size:13px}
  .nav-in a.home{font-size:13.5px;color:var(--muted);font-weight:600}
  .wrap{max-width:640px;margin:50px auto 70px;padding:0 24px}
  h1{font-size:32px;letter-spacing:-.02em;text-align:center}.sub{color:var(--muted);text-align:center;margin:10px 0 28px;font-size:16px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
  .lcard{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
  .lcard .t{font-size:13px;font-weight:700}.lcard .v{font-family:var(--mono);font-size:12.5px;color:var(--brand-d);margin-top:4px}
  .panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px}
  .field{margin-bottom:14px}label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
  input,textarea,select{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:#fff;border:1px solid var(--border-2);border-radius:11px;padding:12px 14px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  textarea{min-height:120px;resize:vertical}
  .btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;font-size:15px;border-radius:11px;border:0;background:var(--brand);color:#fff;padding:13px;cursor:pointer}
  .btn:hover{background:var(--brand-d)}
  .ok{display:none;text-align:center;color:var(--brand-d);font-weight:600;margin-top:14px}
  @media (max-width:520px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
  <div class="nav"><div class="nav-in"><a class="brand" href="landing.html"><span class="mark">CV</span> CodeVault</a><a class="home" href="landing.html">← Home</a></div></div>
  <div class="wrap">
    <h1>Get in touch</h1>
    <p class="sub">Questions, bugs, or feature ideas — we read everything.</p>
    <div class="cards">
      <div class="lcard"><div class="t">Email</div><div class="v">hello@codevault.dev</div></div>
      <div class="lcard"><div class="t">GitHub</div><div class="v">@Gaurav06120714</div></div>
    </div>
    <div class="panel">
      <form onsubmit="event.preventDefault();this.style.display='none';document.getElementById('ok').style.display='block';">
        <div class="field"><label for="cn">Name</label><input id="cn" type="text" autocomplete="name" required /></div>
        <div class="field"><label for="ce">Email</label><input id="ce" type="email" autocomplete="email" required /></div>
        <div class="field"><label for="ct">Topic</label><select id="ct"><option>General question</option><option>Bug report</option><option>Feature request</option><option>Account &amp; billing</option></select></div>
        <div class="field"><label for="cm">Message</label><textarea id="cm" required></textarea></div>
        <button class="btn" type="submit">Send message</button>
      </form>
      <div class="ok" id="ok">Thanks — we'll get back to you soon. ✓</div>
    </div>
  </div>
</body>
</html>
