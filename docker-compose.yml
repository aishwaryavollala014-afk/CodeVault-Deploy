# CodeVault — base stack (data layer + both backend services).
# Dev overrides (hot-reload bind mounts) live in docker-compose.override.yml,
# which Docker Compose merges automatically on `docker compose up`.
#
# Bring up just the data layer (works with zero app code):
#   docker compose up -d postgres redis
# Bring up everything once the services have a package.json:
#   docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: codevault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codevault}
      POSTGRES_DB: ${POSTGRES_DB:-codevault}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codevault} -d ${POSTGRES_DB:-codevault}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - codevault

  redis:
    image: redis:7-alpine
    container_name: codevault-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - codevault

  web-backend:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    container_name: codevault-web-backend
    restart: unless-stopped
    env_file:
      - ./web-backend/.env
    environment:
      # In-container networking: reach the data layer by service name,
      # overriding the localhost values used by host-run tooling.
      DATABASE_URL: postgresql://codevault:codevault@postgres:5432/codevault
      REDIS_URL: redis://redis:6379
    ports:
      - "${WEB_BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codevault

  git-service:
    build:
      context: ./git-service
      dockerfile: Dockerfile
    container_name: codevault-git-service
    restart: unless-stopped
    env_file:
      - ./git-service/.env
    environment:
      # In-container networking: reach the data layer by service name,
      # overriding the localhost values used by host-run tooling.
      DATABASE_URL: postgresql://codevault:codevault@postgres:5432/codevault
      REDIS_URL: redis://redis:6379
    ports:
      - "${GIT_SERVICE_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codevault

networks:
  codevault:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
