# Dev overrides — merged automatically by `docker compose up`.
# Builds the `development` stage and bind-mounts source for hot-reload (nodemon),
# while keeping container node_modules isolated from the host via an anonymous volume.

services:
  web-backend:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./web-backend:/app
      - /app/node_modules
    command: npm run dev

  git-service:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./git-service:/app
      - /app/node_modules
    command: npm run dev
