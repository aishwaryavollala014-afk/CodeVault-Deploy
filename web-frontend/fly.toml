# CodeVault web-frontend (public + same-origin proxy) — Fly.io. See docs/DEPLOY.md.
app = "codevault"
primary_region = "iad"

[build]
  # NEXT_PUBLIC_* is baked into the client bundle at BUILD time (not a runtime secret).
  # "/api" is relative, so the browser hits this app's own origin → the same-origin proxy
  # (see next.config.ts rewrites) forwards to web-backend. Domain-agnostic.
  [build.args]
    NEXT_PUBLIC_API_URL = "/api"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "3000"
  NODE_ENV = "production"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
