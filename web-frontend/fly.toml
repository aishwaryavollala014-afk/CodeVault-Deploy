# CodeVault web-frontend (public + same-origin proxy) — Fly.io. See docs/DEPLOY.md.
app = "codevault"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "3000"
  NODE_ENV = "production"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
